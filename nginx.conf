events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  server {
    listen 80;
    server_name _;

    # Build de React (Vite) servido por Nginx + proxy /tickets al api-gateway
    location / {
      root  /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri/ /index.html;
    }

    # Proxy de la API al api-gateway (mismo origen => sin problemas de CORS).
    # El frontend llama a /tickets, /tickets/:id, /tickets/health/check.
    # El gateway reenvia por NATS al tickets-service (que ya no expone HTTP).
    location /tickets {
      proxy_pass         http://api-gateway:3000;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
